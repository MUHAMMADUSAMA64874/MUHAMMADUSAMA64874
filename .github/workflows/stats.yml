name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Generate local GitHub stats cards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python3 .github/scripts/generate_stats.py

      - name: Validate generated cards
        shell: bash
        run: |
          test -s assets/github-stats.svg
          test -s assets/top-languages.svg
          grep -q "Public GitHub Overview" assets/github-stats.svg
          grep -q "Most Used Languages" assets/top-languages.svg

      - name: Refresh README image cache keys
        env:
          CACHE_KEY: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          key = os.environ["CACHE_KEY"]

          patterns = (
              "assets/github-stats.svg",
              "assets/top-languages.svg",
          )
          for asset in patterns:
              escaped = re.escape(asset)
              if re.search(rf"{escaped}\?v=[^\"')]+", text):
                  text = re.sub(
                      rf"({escaped})\?v=[^\"')]+",
                      rf"\1?v={key}",
                      text,
                  )
              else:
                  text = text.replace(asset, f"{asset}?v={key}")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/github-stats.svg assets/top-languages.svg
          git diff --cached --quiet || git commit -m "chore: refresh local GitHub stats [skip ci]"
          git push
